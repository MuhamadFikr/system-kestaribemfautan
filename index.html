<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jajanan-Z POS | Premium Cloud System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel untuk JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase Libraries -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: #fffaf0;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(249, 115, 22, 0.2); border-radius: 20px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(249, 115, 22, 0.4); }

        @keyframes zoom-in { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .animate-zoom-in { animation: zoom-in 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        
        .product-card { 
            cursor: pointer;
            transition: all 0.2s ease; 
            position: relative;
            z-index: 10;
        }
        .product-card:active { transform: scale(0.92); }
        .product-img { transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover .product-img { transform: scale(1.05); }

        /* Input Cash dengan Kontras Tinggi */
        .cash-input-field {
            background-color: #ffffff !important;
            color: #000000 !important;
            border-color: #f97316 !important;
        }
    </style>
</head>
<body class="antialiased overflow-x-hidden text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- INTERNAL ICON COMPONENTS ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                dashboard: <><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
                cart: <><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></>,
                package: <><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></>,
                logout: <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
                plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>,
                edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
                check: <polyline points="20 6 9 17 4 12"/>,
                eye: <><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>,
                eyeOff: <><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></>,
                x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
                alert: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
                banknote: <><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></>,
                smartphone: <><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></>,
                store: <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>,
                calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        // --- CONFIGURATION ---
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby1_0ARWmgYs_lyrFMNyPlvosoSPiX9I06WXLGEMiTm_U0nvVlNWSuuaElE7S_O9Y9Orw/exec"; 
        const firebaseConfig = {
            apiKey: "AIzaSyB_U-e8oHiHn8PdC77OWIe0WH46KL7chRA",
            authDomain: "jajanan-genz.firebaseapp.com",
            projectId: "jajanan-genz",
            storageBucket: "jajanan-genz.firebasestorage.app",
            messagingSenderId: "280321814728",
            appId: "1:280321814728:web:81c6809c9176994e1ab5fd",
            measurementId: "G-2V19QJ20DF"
        };

        // Initialize Firebase
        let db = null;
        let auth = null;
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            db = firebase.firestore();
            auth = firebase.auth();
        } catch (e) { console.error("Firebase error", e); }
        
        const appId = "jajanan-pos-final-v4"; 

        const App = () => {
            const [fbUser, setFbUser] = useState(null);
            const [view, setView] = useState('login');
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [notification, setNotification] = useState(null);
            const [showPassword, setShowPassword] = useState(false);
            const [authError, setAuthError] = useState(false);
            
            const [filterDate, setFilterDate] = useState(new Date().toISOString().split('T')[0]);
            const [paymentModal, setPaymentModal] = useState(null); 
            const [cashReceived, setCashReceived] = useState('');
            const [isSuccessModal, setIsSuccessModal] = useState(false);

            const [isMenuModalOpen, setIsMenuModalOpen] = useState(false);
            const [editingProduct, setEditingProduct] = useState(null);
            const [variantModal, setVariantModal] = useState(null);
            const [qtyModal, setQtyModal] = useState(null); 
            const [orderQty, setOrderQty] = useState(1);
            const [deleteConfirm, setDeleteConfirm] = useState(null);

            const [loginForm, setLoginForm] = useState({ username: '', password: '' });

            const showNotify = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(null), 7000);
            };

            const logToSpreadsheet = async (data) => {
                if (!APPS_SCRIPT_URL) return;
                try {
                    await fetch(APPS_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                } catch (error) { console.error("Log error", error); }
            };

            useEffect(() => {
                if (!auth) return;
                auth.signInAnonymously().catch(err => {
                    if (err.code === 'auth/configuration-not-found') setAuthError(true);
                });
                const unsubscribeAuth = auth.onAuthStateChanged((user) => setFbUser(user));
                return () => unsubscribeAuth();
            }, []);

            useEffect(() => {
                if (!db) return;
                const colRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('products');
                
                const unsubscribeProducts = colRef.onSnapshot((snapshot) => {
                    if (snapshot.empty) {
                        const INITIAL = [
                            { name: 'SOSTANG (Sosis Kentang)', category: 'SOSTANG', image: 'https://ibb.co.com/9k46yNJ2/Sostang.jpg', hasVariants: true, variants: [{ name: 'Medium', price: 10000 }, { name: 'Large', price: 15000 }], stock: 50 },
                            { name: 'Mozarella Corndog', category: 'MOZARELLA', image: 'https://i.ibb.co.com/pr0JWb5F/mozarella.jpg', hasVariants: true, variants: [{ name: 'Original', price: 13000 }, { name: 'Choco', price: 15000 }, { name: 'Strawberry', price: 15000 }, { name: 'Tiramisu', price: 15000 }, { name: 'Kentang', price: 15000 }], stock: 40 },
                            { name: 'Mozarella Sosis Kentang', category: 'MOZARELLA', image: 'https://i.ibb.co.com/pr0JWb5F/mozarella.jpg', hasVariants: true, variants: [{ name: 'Kentang Medium', price: 17000 }, { name: 'Kentang Large', price: 22000 }], stock: 30 },
                            { name: 'French Fries', category: 'French Fries', image: 'https://i.ibb.co.com/z39t9H4/fries.jpg', hasVariants: true, variants: [{ name: 'Medium', price: 10000 }, { name: 'Large', price: 15000 }], stock: 60 }
                        ];
                        INITIAL.forEach(p => colRef.add(p));
                    } else {
                        setProducts(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    }
                });

                const unsubscribeTransactions = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('transactions')
                    .onSnapshot((snapshot) => setTransactions(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))));

                return () => { unsubscribeProducts(); unsubscribeTransactions(); };
            }, [fbUser]);

            const handleProductClick = (product) => {
                if (product.stock <= 0) return showNotify("Stok sudah habis!");
                if (product.hasVariants) {
                    setVariantModal(product);
                } else {
                    setQtyModal({ product, variantName: 'Original', price: product.variants[0].price });
                    setOrderQty(1);
                }
            };

            const confirmAddToCart = () => {
                const { product, variantName, price } = qtyModal;
                if (orderQty > product.stock) return showNotify("Stok tidak mencukupi!");
                const cartId = `${product.id}-${variantName}`;
                
                setCart(prevCart => {
                    const existing = prevCart.find(item => item.cartId === cartId);
                    if (existing) {
                        return prevCart.map(item => item.cartId === cartId ? { ...item, qty: item.qty + orderQty } : item);
                    } else {
                        return [...prevCart, { 
                            cartId, id: product.id, name: product.name, variant: variantName, 
                            price, image: product.image, qty: orderQty 
                        }];
                    }
                });
                
                setQtyModal(null);
                setOrderQty(1);
                showNotify("Masuk keranjang!");
            };

            const finalizeTransaction = async () => {
                const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
                const today = new Date().toISOString().split('T')[0];
                const time = new Date().toLocaleTimeString('id-ID');
                const itemsStr = cart.map(i => `${i.name} ${i.variant} (x${i.qty})`).join(', ');
                
                const trxData = {
                    id: `TRX-${Date.now()}`,
                    date: today,
                    time: time,
                    items: itemsStr,
                    total: total,
                    paymentMethod: paymentModal.type,
                    cashier: loginForm.username || "Kasir"
                };

                // Kirim ke Spreadsheet
                await logToSpreadsheet(trxData);

                // Sinkron ke Firebase
                if (fbUser && db) {
                    try {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('transactions').add(trxData);
                        for (const item of cart) {
                            const productRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('products').doc(item.id);
                            const snap = await productRef.get();
                            if (snap.exists) {
                                await productRef.update({ stock: Math.max(0, snap.data().stock - item.qty) });
                            }
                        }
                    } catch (e) { console.error(e); }
                }

                setCart([]);
                setPaymentModal(null);
                setIsSuccessModal(true);
            };

            const handleSaveMenu = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = {
                    name: formData.get('name'),
                    category: formData.get('category'),
                    price: parseInt(formData.get('price')),
                    stock: parseInt(formData.get('stock')),
                    image: formData.get('image'),
                    hasVariants: editingProduct ? editingProduct.hasVariants : false,
                };
                if (!data.hasVariants) { data.variants = [{ name: 'Original', price: data.price }]; }
                try {
                    const col = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('products');
                    if (editingProduct) await col.doc(editingProduct.id).update(data);
                    else await col.add(data);
                    setIsMenuModalOpen(false);
                    setEditingProduct(null);
                } catch (err) { showNotify("Gagal simpan!"); }
            };

            const handleStartCheckout = (type) => {
                const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
                setPaymentModal({ type, total });
                setCashReceived('');
            };

            const filteredTransactions = useMemo(() => transactions.filter(t => t.date === filterDate), [transactions, filterDate]);
            const dailyTotal = useMemo(() => filteredTransactions.reduce((sum, t) => sum + t.total, 0), [filteredTransactions]);

            if (view === 'login') {
                return (
                    <div className={`min-h-screen w-full flex items-center justify-center p-4 ${isDarkMode ? 'bg-slate-950 text-white' : 'bg-orange-50 text-slate-900'}`}>
                        <div className={`w-full max-w-md p-8 md:p-10 rounded-[40px] shadow-2xl border-4 ${isDarkMode ? 'bg-slate-900 border-white/5 shadow-black/40' : 'bg-white border-white'} animate-zoom-in`}>
                            <div className="text-center mb-10 text-orange-500 text-center">
                                <div className="inline-flex items-center justify-center w-20 h-20 rounded-[30px] bg-gradient-to-tr from-orange-500 to-yellow-400 mb-6 shadow-2xl text-white">
                                    <Icon name="store" size={40} />
                                </div>
                                <h1 className="text-3xl font-black uppercase tracking-tighter italic leading-none">Jajanan-Z</h1>
                                <p className="opacity-40 mt-1 font-bold uppercase text-[10px] tracking-[0.3em]">Smart Cloud POS</p>
                            </div>
                            
                            {authError && (
                                <div className="mb-6 p-4 bg-red-500/10 border-2 border-red-500/20 rounded-2xl text-[10px] leading-relaxed font-bold text-red-500 uppercase tracking-wider">
                                    <p className="flex items-start gap-2"><Icon name="alert" size={14} className="mt-0.5 shrink-0" /> CLOUD ERROR: Aktifkan 'Anonymous' di Firebase Console.</p>
                                </div>
                            )}

                            <form onSubmit={(e) => {
                                e.preventDefault();
                                if(loginForm.username === 'admin' && loginForm.password === 'admin123') setView('pos');
                                else if(loginForm.username === 'kasir') setView('pos');
                                else showNotify("User: admin / admin123 atau kasir");
                            }} className="space-y-4">
                                <input type="text" placeholder="User ID" className={`w-full px-6 py-4 rounded-2xl border-2 border-transparent focus:border-orange-500 outline-none font-bold ${isDarkMode ? 'bg-slate-800/50 text-white' : 'bg-gray-100 text-slate-900'}`} value={loginForm.username} onChange={e=>setLoginForm({...loginForm, username: e.target.value})} />
                                <div className="relative">
                                    <input type={showPassword ? "text" : "password"} placeholder="Password" className={`w-full px-6 py-4 rounded-2xl border-2 border-transparent focus:border-orange-500 outline-none font-bold ${isDarkMode ? 'bg-slate-800/50 text-white' : 'bg-gray-100 text-slate-900'}`} value={loginForm.password} onChange={e=>setLoginForm({...loginForm, password: e.target.value})} />
                                    <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-5 top-1/2 -translate-y-1/2 text-orange-500 opacity-60">
                                        <Icon name={showPassword ? "eyeOff" : "eye"} size={20} />
                                    </button>
                                </div>
                                <button className="w-full bg-gradient-to-r from-orange-500 to-yellow-500 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all mt-4 uppercase tracking-widest h-14">Mulai Shift</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className={`min-h-screen w-full flex flex-col md:flex-row ${isDarkMode ? 'bg-slate-950 text-white' : 'bg-orange-50 text-slate-900'}`}>
                    <aside className={`w-full md:w-72 lg:w-80 p-6 md:p-8 border-r-2 flex flex-col ${isDarkMode ? 'bg-slate-900 border-white/5' : 'bg-white border-orange-100'}`}>
                        <div className="flex items-center space-x-4 mb-10">
                            <div className="w-10 h-10 rounded-xl bg-orange-500 flex items-center justify-center text-white shadow-lg shadow-orange-500/30">
                                <Icon name="store" size={20} />
                            </div>
                            <span className="font-black text-xl text-orange-500 tracking-tighter italic uppercase">JAJAN-Z</span>
                        </div>
                        <nav className="flex-1 space-y-2">
                            <button onClick={()=>setView('pos')} className={`w-full flex items-center space-x-4 p-4 rounded-2xl font-black transition-all ${view === 'pos' ? 'bg-orange-500 text-white shadow-xl shadow-orange-500/20' : 'opacity-40 hover:opacity-100'}`}>
                                <Icon name="cart" size={20}/> <span className="text-sm">TRANSAKSI</span>
                            </button>
                            <button onClick={()=>setView('inventory')} className={`w-full flex items-center space-x-4 p-4 rounded-2xl font-black transition-all ${view === 'inventory' ? 'bg-orange-500 text-white shadow-xl shadow-orange-500/20' : 'opacity-40 hover:opacity-100'}`}>
                                <Icon name="package" size={20}/> <span className="text-sm">STOK & MENU</span>
                            </button>
                            <button onClick={()=>setView('reports')} className={`w-full flex items-center space-x-4 p-4 rounded-2xl font-black transition-all ${view === 'reports' ? 'bg-orange-500 text-white shadow-xl shadow-orange-500/20' : 'opacity-40 hover:opacity-100'}`}>
                                <Icon name="dashboard" size={20}/> <span className="text-sm">LAPORAN</span>
                            </button>
                        </nav>
                        <div className="mt-auto pt-6 border-t border-white/5 space-y-3">
                            <button onClick={()=>setIsDarkMode(!isDarkMode)} className={`w-full flex items-center justify-between p-3 rounded-xl ${isDarkMode ? 'bg-slate-800/30' : 'bg-gray-100'}`}>
                                <span className="text-[10px] font-black uppercase opacity-40 text-center">Tampilan</span>
                                {isDarkMode ? <Icon name="moon" size={16} className="text-yellow-400"/> : <Icon name="sun" size={16} className="text-orange-500"/>}
                            </button>
                            <button onClick={()=>setView('login')} className="w-full flex items-center space-x-4 p-4 text-red-500 font-black hover:bg-red-500/10 rounded-2xl transition-all">
                                <Icon name="logout" size={20}/> <span className="text-sm uppercase font-bold">KELUAR</span>
                            </button>
                        </div>
                    </aside>

                    <main className="flex-1 p-4 md:p-8 lg:p-10 overflow-y-auto w-full">
                        {view === 'pos' && (
                            <div className="flex flex-col xl:flex-row gap-6 lg:gap-8 h-full">
                                <div className="flex-1 space-y-6 lg:space-y-8 text-left">
                                    <header className="flex flex-col sm:flex-row sm:justify-between sm:items-end gap-4">
                                        <h2 className="text-3xl lg:text-5xl font-black text-orange-500 tracking-tighter uppercase italic leading-tight">Menu Jajan</h2>
                                    </header>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 2xl:grid-cols-3 gap-4 lg:gap-6 pb-20">
                                        {products.map(p => (
                                            <div key={p.id} onClick={()=>handleProductClick(p)} className="product-card group rounded-[40px] border-4 transition-all shadow-xl bg-white border-transparent hover:border-orange-500 relative">
                                                <div className="h-48 md:h-56 lg:h-64 relative overflow-hidden bg-slate-800 rounded-t-[36px]">
                                                    <img src={p.image} className="w-full h-full object-cover product-img" alt={p.name} onError={(e) => { e.target.src = 'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400'; }} />
                                                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                                                    <div className="absolute bottom-4 left-4">
                                                        <span className="text-white text-[8px] lg:text-[10px] font-black bg-orange-500 px-2 py-1 rounded-full uppercase tracking-tighter mb-2 inline-block">{p.category}</span>
                                                        <h4 className="text-lg lg:text-3xl font-black text-white uppercase tracking-tighter italic leading-none">{p.name}</h4>
                                                    </div>
                                                    <div className="absolute top-4 right-4 bg-black/60 backdrop-blur-md px-3 py-1 rounded-xl text-white font-black text-[10px]">
                                                        {p.stock} STOK
                                                    </div>
                                                </div>
                                                <div className="p-4 lg:p-8 flex justify-between items-center text-left">
                                                    <p className="text-orange-500 font-black text-lg lg:text-2xl italic tracking-tighter leading-none">Rp {p.hasVariants ? `${Math.min(...p.variants.map(v=>v.price)).toLocaleString()}` : (p.variants?.[0]?.price || 0).toLocaleString()}</p>
                                                    <div className="w-8 h-8 lg:w-12 lg:h-12 rounded-xl lg:rounded-2xl bg-orange-500 flex items-center justify-center text-white shadow-lg">
                                                        <Icon name="plus" size={18} strokeWidth={3} className="lg:w-6 lg:h-6" />
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                    )}

                    {notification && (
                        <div className="fixed bottom-12 left-1/2 -translate-x-1/2 px-8 lg:px-12 py-4 lg:py-6 bg-gradient-to-r from-orange-500 to-yellow-500 text-white font-black rounded-full shadow-[0_20px_50px_rgba(249,115,22,0.4)] z-[500] flex items-center space-x-4 animate-zoom-in uppercase text-[10px] tracking-widest border-2 border-white/20 leading-none"><Icon name="check" size={24}/> <span>{notification}</span></div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
