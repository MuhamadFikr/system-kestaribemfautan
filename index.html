<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jajanan-Z POS | Ultimate Cloud System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel untuk JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase Libraries -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a; 
            color: #f8fafc;
            transition: background-color 0.3s ease;
            -webkit-font-smoothing: antialiased;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(249, 115, 22, 0.4); border-radius: 20px; }

        .product-card { 
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 10;
        }
        .product-card:hover { transform: translateY(-5px); border-color: #f97316; }
        .product-card:active { transform: scale(0.95); }

        .cash-input-field {
            background-color: #ffffff !important;
            color: #000000 !important;
            border: 3px solid #f97316 !important;
            font-weight: 800;
        }

        .premium-card { background: #1e293b; border: 1px solid rgba(255,255,255,0.05); }
        .material-input { background: #ffffff !important; color: #000000 !important; font-weight: 800; text-align: center; }
        
        @keyframes zoom-in { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .animate-zoom-in { animation: zoom-in 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
    </style>
</head>
<body class="antialiased overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- INTERNAL ICON COMPONENTS ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                dashboard: <><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
                cart: <><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></>,
                layers: <><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></>,
                package: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></>,
                logout: <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
                save: <><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>,
                maximize: <><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></>,
                eye: <><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>,
                eyeOff: <><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></>,
                x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
                plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                sun: <><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></>,
                moon: <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>,
                banknote: <><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></>,
                smartphone: <><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></>,
                calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>,
                history: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
                fileText: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwTL9tnniuGhVtT5YP0tqPBH-2K_S291luHe4ht7_wrEVkrybq9AiV7xb1I2AwwIIHZtg/exec"; 
        const firebaseConfig = {
            apiKey: "AIzaSyB_U-e8oHiHn8PdC77OWIe0WH46KL7chRA",
            authDomain: "jajanan-genz.firebaseapp.com",
            projectId: "jajanan-genz",
            storageBucket: "jajanan-genz.firebasestorage.app",
            messagingSenderId: "280321814728",
            appId: "1:280321814728:web:81c6809c9176994e1ab5fd"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = "jajanan-pos-final-v900"; 

        const INITIAL_DATA = [
            { name: 'SOSTANG (Sosis Kentang)', category: 'SOSTANG', image: 'https://i.ibb.co.com/9k46yNJ2/sostang.jpg', hasVariants: true, variants: [{ name: 'Medium', price: 10000 }, { name: 'Large', price: 15000 }], stock: 50 },
            { name: 'Mozarella Corndog', category: 'MOZARELLA', image: 'https://i.ibb.co.com/pr0JWb5F/mozarella.jpg', hasVariants: true, variants: [{ name: 'Original', price: 13000 }, { name: 'Choco', price: 15000 }, { name: 'Strawberry', price: 15000 }, { name: 'Tiramisu', price: 15000 }, { name: 'Kentang', price: 15000 }], stock: 40 },
            { name: 'Mozarella Sosis Kentang', category: 'MOZARELLA', image: 'https://i.ibb.co.com/pr0JWb5F/mozarella.jpg', hasVariants: true, variants: [{ name: 'Kentang Medium', price: 17000 }, { name: 'Kentang Large', price: 22000 }], stock: 30 },
            { name: 'French Fries', category: 'French Fries', image: 'https://i.ibb.co.com/z39t9H4/fries.jpg', hasVariants: true, variants: [{ name: 'Medium', price: 10000 }, { name: 'Large', price: 15000 }], stock: 60 }
        ];

        const App = () => {
            const [view, setView] = useState('login');
            const [currentUser, setCurrentUser] = useState(null);
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [rawMaterials, setRawMaterials] = useState({ sosis_besar: 0, sosis_kecil: 0, mika: 0, keju: 0 });
            const [tempMaterials, setTempMaterials] = useState({ sosis_besar: 0, sosis_kecil: 0, mika: 0, keju: 0 });
            const [notification, setNotification] = useState(null);
            const [showPassword, setShowPassword] = useState(false);
            const [isLoggingIn, setIsLoggingIn] = useState(false);
            const [filterDate, setFilterDate] = useState(new Date().toLocaleDateString('en-CA'));
            
            const [variantModal, setVariantModal] = useState(null);
            const [qtyModal, setQtyModal] = useState(null);
            const [paymentModal, setPaymentModal] = useState(null);
            const [orderQty, setOrderQty] = useState(1);
            const [cashReceived, setCashReceived] = useState('');
            const [isSuccessModal, setIsSuccessModal] = useState(false);
            const [loginForm, setLoginForm] = useState({ username: '', password: '' });

            const showNotify = (m) => { setNotification(m); setTimeout(() => setNotification(null), 4000); };

            const toggleFullscreen = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(() => showNotify("Fullscreen diblokir"));
                } else { document.exitFullscreen(); }
            };

            const callGAS = async (data) => {
                try {
                    const response = await fetch(APPS_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(data)
                    });
                    const resText = await response.text();
                    try { return JSON.parse(resText); } catch(e) { return { success: true }; }
                } catch (error) { return { error: "Koneksi Database Gagal" }; }
            };

            // --- SYNC FIREBASE ---
            useEffect(() => {
                auth.signInAnonymously();
                const unsubProducts = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('products')
                    .onSnapshot(snap => {
                        if (!snap.empty) {
                            setProducts(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        } else {
                            setProducts(INITIAL_DATA.map((p, i) => ({ id: 'local-'+i, ...p })));
                        }
                    });

                const unsubTrx = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('transactions')
                    .onSnapshot(snap => {
                        setTransactions(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    });

                const unsubMats = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('materials').doc('daily_stock')
                    .onSnapshot(doc => { 
                        if (doc.exists) {
                            setRawMaterials(doc.data());
                            setTempMaterials(doc.data());
                        }
                    });

                return () => { unsubProducts(); unsubTrx(); unsubMats(); };
            }, []);

            const filteredTransactions = useMemo(() => transactions.filter(t => t.date === filterDate), [transactions, filterDate]);
            const dailyTotal = useMemo(() => filteredTransactions.reduce((sum, t) => sum + (Number(t.total) || 0), 0), [filteredTransactions]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setIsLoggingIn(true);
                const res = await callGAS({ action: "validateLogin", username: loginForm.username, password: loginForm.password });
                if (res && res.success) {
                    setCurrentUser({ name: res.name, role: res.role });
                    setView('pos');
                    showNotify(`Halo ${res.name}, semangat jualan!`);
                } else {
                    showNotify(res?.error || "Gagal Login! Cek User ID / Password");
                }
                setIsLoggingIn(false);
            };

            const handleProductClick = (p) => {
                if (p.stock <= 0) return showNotify("Stok habis!");
                setVariantModal(p);
            };

            const handleAddToCart = () => {
                const { product, variantName, price } = qtyModal;
                const cartId = `${product.id}-${variantName}`;
                setCart(prev => {
                    const exist = prev.find(x => x.cartId === cartId);
                    if (exist) return prev.map(x => x.cartId === cartId ? {...x, qty: x.qty + orderQty} : x);
                    return [...prev, { cartId, id: product.id, name: product.name, variant: variantName, price, image: product.image, qty: orderQty, category: product.category }];
                });
                setQtyModal(null);
                showNotify("Masuk keranjang!");
            };

            const handleStartCheckout = (type) => {
                const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
                if (total === 0) return showNotify("Pilih menu dahulu!");
                setPaymentModal({ type, total });
                setCashReceived('');
            };

            const finalizeTransaction = async () => {
                const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
                const localDate = new Date();
                const todayStr = localDate.toLocaleDateString('en-CA');
                const timeStr = localDate.toLocaleTimeString('id-ID');
                const cashierName = currentUser?.name || "Kasir";
                
                const trxData = {
                    id: `TRX-${Date.now()}`,
                    date: todayStr,
                    time: timeStr,
                    items: cart.map(i => `${i.name} ${i.variant} (x${i.qty})`).join(', '),
                    total: total,
                    paymentMethod: paymentModal.type,
                    cashier: cashierName
                };

                await callGAS({ ...trxData, action: "logTransaction" });

                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('transactions').add(trxData);
                    let newMats = { ...rawMaterials };
                    for (const item of cart) {
                        if (item.variant.toLowerCase().includes("large")) newMats.sosis_besar -= item.qty;
                        if (item.variant.toLowerCase().includes("medium")) newMats.sosis_kecil -= item.qty;
                        newMats.mika -= item.qty;
                        if (!item.id.includes('local')) {
                            const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('products').doc(item.id);
                            const snap = await ref.get();
                            if (snap.exists) await ref.update({ stock: Math.max(0, snap.data().stock - item.qty) });
                        }
                    }
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('materials').doc('daily_stock').set(newMats);
                    await callGAS({ ...newMats, cashier: cashierName, action: "updateMaterials", date: todayStr });
                } catch (e) {}

                setCart([]);
                setPaymentModal(null);
                setIsSuccessModal(true);
            };

            const saveAllMaterials = async () => {
                const cashierName = currentUser?.name || "Admin";
                const todayStr = new Date().toLocaleDateString('en-CA');
                showNotify("Menyimpan stok...");
                await callGAS({ ...tempMaterials, cashier: cashierName, action: "updateMaterials", date: todayStr });
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('materials').doc('daily_stock').set(tempMaterials);
                showNotify("Bahan baku tersimpan!");
            };

            const resetDatabase = async () => {
                if(!window.confirm("Isi database cloud dengan menu awal?")) return;
                const colRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('products');
                for (const p of INITIAL_DATA) { await colRef.add(p); }
                showNotify("Data Berhasil Dimuat!");
            };

            if (view === 'login') return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-slate-950">
                    <div className="w-full max-w-md p-10 rounded-[55px] bg-slate-900 border-4 border-white/5 shadow-2xl animate-zoom-in text-white text-center">
                        <div className="mb-10 text-orange-500">
                            <div className="inline-flex items-center justify-center w-20 h-20 rounded-[30px] bg-gradient-to-tr from-orange-500 to-yellow-400 mb-6 shadow-2xl text-white"><Icon name="dashboard" size={40} /></div>
                            <h1 className="text-3xl font-black uppercase italic tracking-tighter leading-none">Jajanan-Z</h1>
                            <p className="opacity-40 mt-1 font-bold uppercase text-[10px] tracking-[0.3em]">Smart Cloud POS</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-4 text-left">
                            <label className="text-[10px] font-bold uppercase opacity-30 ml-4">User ID</label>
                            <input type="text" placeholder="Masukkan ID" className="w-full px-6 py-4 rounded-3xl bg-slate-800 border-2 border-transparent focus:border-orange-500 outline-none font-bold text-white h-14" value={loginForm.username} onChange={e=>setLoginForm({...loginForm, username: e.target.value})} required />
                            
                            <label className="text-[10px] font-bold uppercase opacity-30 ml-4">Password</label>
                            <div className="relative">
                                <input type={showPassword ? "text" : "password"} placeholder="Masukkan Kunci" className="w-full px-6 py-4 rounded-3xl bg-slate-800 border-2 border-transparent focus:border-orange-500 outline-none font-bold text-white h-14" value={loginForm.password} onChange={e=>setLoginForm({...loginForm, password: e.target.value})} required />
                                <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-5 top-1/2 -translate-y-1/2 text-orange-500 opacity-60"><Icon name={showPassword ? "eyeOff" : "eye"} size={20} /></button>
                            </div>
                            <button disabled={isLoggingIn} className="w-full bg-gradient-to-r from-orange-500 to-yellow-500 text-white font-black py-4 rounded-3xl shadow-xl active:scale-95 transition-all mt-6 h-14 flex items-center justify-center uppercase italic font-black">
                                {isLoggingIn ? "Otentikasi..." : "Buka Kedai"}
                            </button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className={`min-h-screen flex flex-col md:flex-row ${isDarkMode ? 'bg-slate-950 text-white' : 'bg-slate-50 text-slate-900'}`}>
                    <aside className={`w-full md:w-72 lg:w-80 p-8 border-r-2 flex flex-col ${isDarkMode ? 'bg-slate-900 border-white/5' : 'bg-white border-orange-100'}`}>
                        <div className="flex items-center space-x-4 mb-12">
                            <div className="w-10 h-10 rounded-xl bg-orange-500 flex items-center justify-center text-white shadow-lg"><Icon name="dashboard" size={20} /></div>
                            <span className="font-black text-xl text-orange-500 tracking-tighter italic leading-none">JAJAN GEN-Z</span>
                        </div>
                        <nav className="flex-1 space-y-2 text-left leading-none">
                            <button onClick={()=>setView('pos')} className={`w-full flex items-center space-x-4 p-4 rounded-2xl font-black transition-all ${view === 'pos' ? 'bg-orange-500 text-white shadow-xl' : 'opacity-40 hover:opacity-100'}`}><Icon name="cart" size={20}/> <span className="text-sm">TRANSAKSI</span></button>
                            <button onClick={()=>setView('materials')} className={`w-full flex items-center space-x-4 p-4 rounded-2xl font-black transition-all ${view === 'materials' ? 'bg-orange-500 text-white shadow-xl' : 'opacity-40 hover:opacity-100'}`}><Icon name="layers" size={20}/> <span className="text-sm uppercase">Bahan Baku</span></button>
                            <button onClick={()=>setView('reports')} className={`w-full flex items-center space-x-4 p-4 rounded-2xl font-black transition-all ${view === 'reports' ? 'bg-orange-500 text-white shadow-xl' : 'opacity-40 hover:opacity-100'}`}><Icon name="history" size={20}/> <span className="text-sm">LAPORAN</span></button>
                            <button onClick={()=>setView('inventory')} className={`w-full flex items-center space-x-4 p-4 rounded-2xl font-black transition-all ${view === 'inventory' ? 'bg-orange-500 text-white shadow-xl' : 'opacity-40 hover:opacity-100'}`}><Icon name="package" size={20}/> <span className="text-sm uppercase text-left">Menu & Stok</span></button>
                        </nav>
                        <div className="mt-auto pt-6 border-t border-white/5 space-y-3">
                            <button onClick={toggleFullscreen} className={`w-full flex items-center justify-between p-3 rounded-xl ${isDarkMode ? 'bg-slate-800/30' : 'bg-gray-100'}`}><span className="text-[10px] font-black uppercase opacity-40 text-center">Layar Penuh</span><Icon name="maximize" size={16}/></button>
                            <button onClick={()=>setIsDarkMode(!isDarkMode)} className={`w-full flex items-center justify-between p-3 rounded-xl ${isDarkMode ? 'bg-slate-800/30' : 'bg-gray-100'}`}><span className="text-[10px] font-black uppercase opacity-40 text-center">Tampilan</span>{isDarkMode ? <Icon name="sun" size={16} className="text-yellow-400"/> : <Icon name="moon" size={16} className="text-orange-500"/>}</button>
                            <button onClick={()=>setView('login')} className="w-full flex items-center space-x-4 p-4 text-red-500 font-black hover:bg-red-500/10 rounded-2xl transition-all leading-none"><Icon name="logout" size={20}/> <span className="text-sm uppercase font-bold">KELUAR</span></button>
                        </div>
                    </aside>

                    <main className="flex-1 p-8 lg:p-10 overflow-y-auto w-full text-left">
                        {view === 'pos' && (
                            <div className="flex flex-col xl:flex-row gap-10 h-full">
                                <div className="flex-1 space-y-8">
                                    <header><h2 className="text-4xl lg:text-5xl font-black text-orange-500 tracking-tighter uppercase italic leading-none">Menu Jajan</h2></header>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 2xl:grid-cols-3 gap-6 pb-20">
                                        {products.length === 0 ? <p className="opacity-30 italic">Memuat menu...</p> : products.map(p => (
                                            <div key={p.id} onClick={()=>handleProductClick(p)} className="product-card premium-card rounded-[45px] border-4 transition-all shadow-xl bg-white dark:bg-slate-900 border-transparent hover:border-orange-500 relative overflow-hidden">
                                                <div className="h-48 relative overflow-hidden bg-slate-800 pointer-events-none rounded-t-[40px]">
                                                    <img src={p.image} className="w-full h-full object-cover" alt={p.name} onError={(e) => { e.target.src = 'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400'; }} />
                                                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>

                    )}

                    {notification && (
                        <div className="fixed bottom-12 left-1/2 -translate-x-1/2 px-10 lg:px-14 py-6 bg-gradient-to-r from-orange-500 to-yellow-500 text-white font-black rounded-full shadow-[0_25px_60px_rgba(249,115,22,0.5)] z-[500] flex items-center space-x-6 animate-zoom-in uppercase text-xs tracking-widest border-2 border-white/20 leading-none italic uppercase italic"><span>{notification}</span></div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
