<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Persuratan BEM Fahutan IPB</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0a1128; color: white; }
        .glass { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.15); }
        select option { color: black; background: white; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Animasi Shimmer untuk Tombol Login */
        .shimmer-btn {
            position: relative;
            overflow: hidden;
        }
        .shimmer-btn::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0) 40%,
                rgba(255, 255, 255, 0.4) 50%,
                rgba(255, 255, 255, 0) 60%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: rotate(45deg);
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-150%) rotate(45deg); }
            100% { transform: translateX(150%) rotate(45deg); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body class="overflow-x-hidden text-left">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;
        
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxxmMf9yjoNuzbypcGQMp2Q_XSpgzcWfuEG_hHvne_fIWg-Oy9iXEMtcsqqOSq1cmGv/exec"; 
        const LOGO_URL = "https://i.ibb.co.com/PGDMfSbq/logo.png";

        // --- KOMPONEN UI DI LUAR APP ---
        const GlassCard = ({ children, className = "" }) => (
            <div className={`glass rounded-2xl p-6 shadow-2xl relative z-10 ${className}`}>
                {children}
            </div>
        );

        const InputField = ({ label, showToggle, toggleAction, isPasswordVisible, ...props }) => (
            <div className="mb-4 relative group text-left">
                <label className="block text-[10px] font-black uppercase tracking-widest text-blue-200 mb-2">{label}</label>
                <div className="relative flex items-center">
                    <input 
                        {...props} 
                        className={`w-full bg-white/5 border rounded-xl px-4 py-3 pr-10 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-white/10 transition-all ${props.disabled ? 'border-white/5 opacity-40 cursor-not-allowed' : 'border-white/10 group-hover:border-white/30'}`}
                    />
                    {showToggle && (
                        <button 
                            type="button" 
                            onClick={toggleAction}
                            className="absolute right-3 top-0 bottom-0 flex items-center justify-center text-white/40 hover:text-white transition-colors px-2"
                        >
                            <i data-lucide={isPasswordVisible ? "eye-off" : "eye"} style={{ width: 18, height: 18 }}></i>
                        </button>
                    )}
                </div>
            </div>
        );

        const SelectField = ({ label, options, ...props }) => (
            <div className="mb-4 group text-left">
                <label className="block text-[10px] font-black uppercase tracking-widest text-blue-200 mb-2">{label}</label>
                <div className="relative">
                    <select 
                        {...props} 
                        className={`w-full bg-white/10 border rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer appearance-none ${props.disabled ? 'border-white/5 opacity-40 cursor-not-allowed' : 'border-white/10'}`}
                    >
                        <option value="">Pilih Opsi</option>
                        {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                    </select>
                    <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none opacity-40 group-hover:opacity-100 transition-opacity">
                        <i data-lucide="chevron-down" style={{width: 16}}></i>
                    </div>
                </div>
            </div>
        );

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [loading, setLoading] = useState(false);
            const [dataArsip, setDataArsip] = useState([]);
            const [dataCOPM, setDataCOPM] = useState([]);
            const [loginForm, setLoginForm] = useState({ username: '', password: '' });
            const [showPassword, setShowPassword] = useState(false);
            const [error, setError] = useState('');
            const [submitting, setSubmitting] = useState(false);
            const [searchQueryArsip, setSearchQueryArsip] = useState('');
            const [searchQueryCOPM, setSearchQueryCOPM] = useState('');
            const [showDeleteModal, setShowDeleteModal] = useState(null);
            const [sortBy, setSortBy] = useState('terbaru');

            const [formArsip, setFormArsip] = useState({
                tglTerima: '', noSurat: '', tglSurat: '', asal: '', perihal: '', diteruskan: '', kode: '', file: null
            });

            const [formCOPM, setFormCOPM] = useState({
                noSurat: '', judul: '', linkDocs: '', owner: '', tglIsi: '', deadline: '', status: 'Draft', notes: '', linkPdf: ''
            });

            const DEPARTEMEN_LIST = ["BEM Fahutan", "Ketua BEM", "Sekretaris", "Bendahara", "Koordinator Bidang", "Badan Manajemen Internal", "Biro Research and Development", "Biro Media and Digital Information", "Departemen Advokasi dan Kesejahteraan Mahasiswa", "Departemen Konektivitas Eksternal", "Departemen Ekonomi Kreatif", "Departemen Human Resource and Development", "Departemen Akademik dan Prestasi", "Departemen Seni dan Budaya", "Departemen Olahraga", "Departemen Sosial Lingkungan dan Kehutanan", "Departemen Kajian dan Aksi Strategis"];
            const KODE_ARSIP = ["INT", "ORM", "UKM", "BEM", "DTM", "FAK", "IPB", "EKS", "MIT", "MED"];
            const OWNER_LIST = ["BPH", "MI", "RND", "MENDIGI", "KESTARI", "FINANCE", "KORBID", "KONEK", "ADKESMAH", "EKRAF", "AKPRES", "SENBUD", "HRD", "DEPOR", "SLH", "KASTRAT", "[MP] FORCUP", "[MP] BCR", "[MP] SEMARAK", "[MP] FACT", "[MP] RIMBADES", "Faculty Day"];
            const STATUS_LIST = ["Draft", "Final", "Revisi"];

            useEffect(() => { lucide.createIcons(); });

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                
                // Tambahkan jeda minimal 1.5 detik agar animasi shimmer terlihat
                const minLoadingTime = new Promise(resolve => setTimeout(resolve, 1500));
                
                try {
                    const fetchLogin = fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'login', payload: loginForm })
                    });
                    
                    const [response] = await Promise.all([fetchLogin, minLoadingTime]);
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        setUser(result.user);
                    } else {
                        setError(result.message || 'Username atau password salah.');
                    }
                } catch (err) { 
                    setError('Gagal menyambung ke server.'); 
                } finally {
                    setLoading(false);
                }
            };

            const fetchData = useCallback(async () => {
                if (!user) return;
                setLoading(true);
                try {
                    const response = await fetch(`${SCRIPT_URL}?action=readAll`);
                    const result = await response.json();
                    setDataArsip(result.arsip || []);
                    setDataCOPM(result.copm || []);
                } catch (err) { console.error(err); }
                setLoading(false);
            }, [user]);

            useEffect(() => { if (user) fetchData(); }, [user, fetchData]);

            const handleSubmitArsip = async (e) => {
                e.preventDefault();
                setSubmitting(true);
                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'submitArsip', payload: formArsip })
                    });
                    const res = await response.json();
                    if(res.status === 'success') {
                        alert("Arsip disimpan.");
                        setFormArsip({ tglTerima: '', noSurat: '', tglSurat: '', asal: '', perihal: '', diteruskan: '', kode: '', file: null });
                        fetchData();
                        setView('data-arsip');
                    }
                } catch (err) { alert("Error sistem."); }
                setSubmitting(false);
            };

            const handleSubmitCOPM = async (e) => {
                e.preventDefault();
                setSubmitting(true);
                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'submitCOPM', payload: { ...formCOPM, notes: formCOPM.notes || "" } })
                    });
                    const res = await response.json();
                    if(res.status === 'success') {
                        alert("Data COPM diperbarui.");
                        setFormCOPM({ noSurat: '', judul: '', linkDocs: '', owner: '', tglIsi: '', deadline: '', status: 'Draft', notes: '', linkPdf: '' });
                        fetchData();
                        setView('cek-status');
                    }
                } catch (err) { alert("Gagal memperbarui data."); }
                setSubmitting(false);
            };

            const handleDeleteArsip = async (noSurat) => {
                setLoading(true);
                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'deleteArsip', payload: { noSurat } })
                    });
                    const res = await response.json();
                    if(res.status === 'success') fetchData();
                } catch (err) { console.error(err); }
                setShowDeleteModal(null);
                setLoading(false);
            };

            const handleEditCOPM = (item) => {
                setFormCOPM(item);
                setView('ajukan');
            };

            // LOGIKA FILTER & SORTIR
            const filteredArsip = dataArsip.filter(it => 
                Object.values(it).some(val => String(val).toLowerCase().includes(searchQueryArsip.toLowerCase()))
            );

            const finalCOPM = useMemo(() => {
                let list = dataCOPM.map((it, idx) => ({ ...it, dbIndex: idx }));

                if (user && user.role === 'kestari' && user.owner_unit) {
                    list = list.filter(it => it.owner === user.owner_unit);
                }
                
                if (searchQueryCOPM) {
                    const q = searchQueryCOPM.toLowerCase();
                    list = list.filter(it => 
                        it.judul.toLowerCase().includes(q) || 
                        it.owner.toLowerCase().includes(q)
                    );
                }

                if (sortBy === 'terbaru') {
                    list.sort((a, b) => b.dbIndex - a.dbIndex);
                } else if (sortBy === 'judul') {
                    list.sort((a, b) => a.judul.localeCompare(b.judul));
                } else if (sortBy === 'owner') {
                    list.sort((a, b) => a.owner.localeCompare(b.owner));
                } else if (sortBy === 'status') {
                    list.sort((a, b) => a.status.localeCompare(b.status));
                }
                
                return list;
            }, [dataCOPM, user, sortBy, searchQueryCOPM]);

            if (!user) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4 relative bg-[#060b1d]">
                        <div className="absolute w-[600px] h-[600px] bg-blue-600/10 rounded-full blur-[140px] pointer-events-none"></div>
                        <GlassCard className="w-full max-w-md border-t-4 border-t-[#193DEB] fade-in">
                            <div className="text-center mb-10">
                                <img src={LOGO_URL} alt="Logo" className="h-28 mx-auto mb-6" />
                                <h1 className="text-2xl font-black uppercase tracking-widest text-white">Sistem Persuratan</h1>
                                <p className="text-blue-300 text-[10px] mt-2 font-black uppercase tracking-[0.2em]">BEM Fahutan Kabinet Elaborasi Mimpi</p>
                            </div>
                            <form onSubmit={handleLogin}>
                                <InputField label="Username Pengguna" type="text" value={loginForm.username} onChange={e => setLoginForm(p => ({...p, username: e.target.value}))} required placeholder="Username" />
                                <InputField 
                                    label="Kata Sandi" 
                                    type={showPassword ? "text" : "password"} 
                                    value={loginForm.password} 
                                    onChange={e => setLoginForm(p => ({...p, password: e.target.value}))} 
                                    required 
                                    placeholder="Password"
                                    showToggle={true}
                                    isPasswordVisible={showPassword}
                                    toggleAction={() => setShowPassword(!showPassword)}
                                />
                                {error && <div className="text-red-400 text-[10px] mb-6 flex items-center gap-2 font-bold"><i data-lucide="alert-circle" style={{width: 14}}></i> {error}</div>}
                                <button 
                                    disabled={loading} 
                                    className={`w-full py-4 bg-[#193DEB] hover:bg-blue-600 text-white font-black rounded-2xl transition-all shadow-lg flex justify-center items-center gap-3 ${loading ? 'shimmer-btn opacity-80 cursor-wait' : 'active:scale-95'}`}
                                >
                                    {loading ? <i data-lucide="loader" className="animate-spin"></i> : <i data-lucide="log-in"></i>}
                                    {loading ? "MEMPROSES AKSES..." : "MASUK KE SISTEM"}
                                </button>
                            </form>
                        </GlassCard>
                        <div className="mt-10 text-white/20 text-[9px] font-black uppercase tracking-[0.4em]">&copy; Sekretaris Eksekutif</div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-[#0a1128]">
                    {/* Sidebar */}
                    <div className="w-full md:w-72 bg-black/50 backdrop-blur-3xl border-r border-white/10 p-6 flex flex-col shrink-0 h-screen overflow-y-auto text-left">
                        
                        <div className="mb-8 p-5 rounded-3xl bg-white/5 border border-white/10 shadow-xl">
                            <div className="flex items-center gap-4 mb-5 text-left">
                                <div className="bg-[#193DEB] w-12 h-12 rounded-2xl font-black flex items-center justify-center text-white text-xl">U</div>
                                <div className="truncate flex-1 text-left">
                                    <b className="text-white text-xs uppercase tracking-tighter block truncate">{user.nama_lengkap}</b>
                                    <span className="opacity-40 font-bold uppercase text-[9px] block truncate text-left">{user.biro_departemen}</span>
                                </div>
                            </div>
                            <button onClick={() => setUser(null)} className="w-full flex items-center justify-center gap-2 py-3 bg-red-500/10 hover:bg-red-500/20 text-red-400 font-black rounded-xl transition-all text-[10px] border border-red-500/20 tracking-widest uppercase">
                                <i data-lucide="log-out" style={{width: 12}}></i> Logout Sistem
                            </button>
                        </div>

                        <div className="mb-10 flex items-center gap-3 px-3">
                            <img src={LOGO_URL} className="h-9" alt="Logo" />
                            <div className="text-xs font-black leading-tight uppercase tracking-tighter italic text-white">ELABORASI<br/><span className="text-blue-500 not-italic">MIMPI</span></div>
                        </div>

                        <nav className="flex-1 space-y-2 font-bold text-sm">
                            <button onClick={() => setView('dashboard')} className={`w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all ${view === 'dashboard' ? 'bg-[#193DEB] text-white shadow-lg shadow-blue-900/40' : 'hover:bg-white/5 text-gray-400'}`}>
                                <i data-lucide="layout-dashboard" style={{width: 18}}></i> Dashboard
                            </button>
                            {user.role === 'admin' && (
                                <>
                                    <div className="pt-6 pb-2 px-5 text-[10px] font-black text-gray-500 uppercase tracking-widest opacity-40">Pengarsipan</div>
                                    <button onClick={() => setView('arsipkan')} className={`w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all ${view === 'arsipkan' ? 'bg-[#193DEB] text-white' : 'hover:bg-white/5 text-gray-400'}`}>
                                        <i data-lucide="archive" style={{width: 18}}></i> Arsipkan Surat
                                    </button>
                                    <button onClick={() => setView('data-arsip')} className={`w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all ${view === 'data-arsip' ? 'bg-[#193DEB] text-white' : 'hover:bg-white/5 text-gray-400'}`}>
                                        <i data-lucide="list" style={{width: 18}}></i> Data Surat
                                    </button>
                                </>
                            )}
                            <div className="pt-6 pb-2 px-5 text-[10px] font-black text-gray-500 uppercase tracking-widest opacity-40">COPM Surat</div>
                            <button onClick={() => setView('ajukan')} className={`w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all ${view === 'ajukan' ? 'bg-[#193DEB] text-white' : 'hover:bg-white/5 text-gray-400'}`}>
                                <i data-lucide="plus-circle" style={{width: 18}}></i> Ajukan Surat
                            </button>
                            <button onClick={() => setView('cek-status')} className={`w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all ${view === 'cek-status' ? 'bg-[#193DEB] text-white' : 'hover:bg-white/5 text-gray-400'}`}>
                                <i data-lucide="shield-check" style={{width: 18}}></i> Cek Status
                            </button>
                        </nav>
                    </div>

                    {/* Content */}
                    <div className="flex-1 p-6 md:p-12 overflow-y-auto h-screen bg-[#080d21]">
                        {view === 'dashboard' && (
                            <div className="fade-in text-left">
                                <h2 className="text-4xl font-black mb-10 italic uppercase tracking-tighter text-left">Dashboard Utama</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <GlassCard className="border-l-8 border-l-blue-600 py-12 flex justify-between items-center text-left">
                                        <div>
                                            <p className="text-[11px] font-black uppercase text-blue-400 mb-2">Arsip Surat Masuk</p>
                                            <h3 className="text-7xl font-black tracking-tighter">{dataArsip.length}</h3>
                                        </div>
                                        <i data-lucide="archive" className="opacity-10 scale-150 mr-4" style={{width: 80, height: 80}}></i>
                                    </GlassCard>
                                    <GlassCard className="border-l-8 border-l-indigo-600 py-12 flex justify-between items-center text-left">
                                        <div>
                                            <p className="text-[11px] font-black uppercase text-indigo-400 mb-2">Surat Keluar (COPM)</p>
                                            <h3 className="text-7xl font-black tracking-tighter">{dataCOPM.length}</h3>
                                        </div>
                                        <i data-lucide="file-text" className="opacity-10 scale-150 mr-4" style={{width: 80, height: 80}}></i>
                                    </GlassCard>
                                </div>
                            </div>
                        )}

                        {view === 'arsipkan' && (
                            <div className="max-w-4xl mx-auto fade-in">
                                <h2 className="text-2xl font-black mb-8 uppercase flex items-center gap-4 italic text-left"><i data-lucide="archive" className="text-blue-400"></i> Arsipkan Surat</h2>
                                <GlassCard>
                                    <form onSubmit={handleSubmitArsip} className="grid grid-cols-1 md:grid-cols-2 gap-x-8">
                                        <InputField label="Tgl Terima" type="date" value={formArsip.tglTerima} onChange={e => setFormArsip(p => ({...p, tglTerima: e.target.value}))} required />
                                        <InputField label="Nomor Surat" type="text" value={formArsip.noSurat} onChange={e => setFormArsip(p => ({...p, noSurat: e.target.value}))} required placeholder="Nomor Surat" />
                                        <InputField label="Tgl Surat" type="date" value={formArsip.tglSurat} onChange={e => setFormArsip(p => ({...p, tglSurat: e.target.value}))} required />
                                        <InputField label="Asal Pengirim" type="text" value={formArsip.asal} onChange={e => setFormArsip(p => ({...p, asal: e.target.value}))} required placeholder="Asal Instansi" />
                                        <div className="md:col-span-2"><InputField label="Perihal" type="text" value={formArsip.perihal} onChange={e => setFormArsip(p => ({...p, perihal: e.target.value}))} required placeholder="Perihal" /></div>
                                        <SelectField label="Diteruskan Ke" options={DEPARTEMEN_LIST} value={formArsip.diteruskan} onChange={e => setFormArsip(p => ({...p, diteruskan: e.target.value}))} required />
                                        <SelectField label="Kode" options={KODE_ARSIP} value={formArsip.kode} onChange={e => setFormArsip(p => ({...p, kode: e.target.value}))} required />
                                        <div className="md:col-span-2 mb-8">
                                            <div className="border-2 border-dashed border-white/10 p-12 rounded-3xl text-center relative group bg-white/5">
                                                <input type="file" accept=".pdf" className="absolute inset-0 opacity-0 cursor-pointer z-10" onChange={e => {
                                                    const f = e.target.files[0];
                                                    const r = new FileReader();
                                                    r.onload = () => setFormArsip(p => ({...p, file: { base64: r.result.split(',')[1], name: f.name, type: f.type }}));
                                                    r.readAsDataURL(f);
                                                }} />
                                                {formArsip.file ? <span className="text-green-400 font-black">{formArsip.file.name}</span> : <span className="opacity-30 font-black">UNGGAH BERKAS PDF</span>}
                                            </div>
                                        </div>
                                        <button disabled={submitting} className="bg-[#193DEB] hover:bg-blue-600 px-10 py-4 rounded-2xl font-black uppercase shadow-2xl transition-all">SIMPAN ARSIP</button>
                                    </form>
                                </GlassCard>
                            </div>
                        )}

                        {view === 'data-arsip' && (
                            <div className="fade-in">
                                <div className="flex justify-between items-center mb-10 gap-6 text-left">
                                    <h2 className="text-2xl font-black uppercase italic text-left">Database Arsip</h2>
                                    <input className="bg-white/5 border border-white/10 rounded-2xl px-6 py-3 text-sm w-full md:w-96 outline-none focus:ring-2 focus:ring-blue-500 font-bold" placeholder="Cari data..." value={searchQueryArsip} onChange={e => setSearchQueryArsip(e.target.value)} />
                                </div>
                                <GlassCard className="p-0 overflow-hidden">
                                    <div className="overflow-x-auto text-left">
                                        <table className="w-full text-left text-[11px] whitespace-nowrap">
                                            <thead className="bg-white/5 font-black uppercase tracking-widest text-blue-200">
                                                <tr>
                                                    <th className="px-8 py-6 border-r border-white/5">No. Surat</th>
                                                    <th className="px-8 py-4 border-r border-white/5 text-left">Asal</th>
                                                    <th className="px-8 py-4 border-r border-white/5 text-left">Perihal</th>
                                                    <th className="px-8 py-4 text-center">Aksi</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-white/5">
                                                {filteredArsip.map((it, i) => (
                                                    <tr key={i} className="hover:bg-white/[0.04] transition-colors">
                                                        <td className="px-8 py-6 font-mono font-black text-blue-400">{it.noSurat}</td>
                                                        <td className="px-8 py-6 font-bold">{it.asal}</td>
                                                        <td className="px-8 py-6 truncate max-w-xs">{it.perihal}</td>
                                                        <td className="px-8 py-6 flex justify-center gap-4">
                                                            {it.fileUrl && <a href={it.fileUrl} target="_blank" className="bg-blue-500/10 text-blue-400 px-3 py-1.5 rounded-lg font-black"><i data-lucide="file-text" style={{width: 14}}></i></a>}
                                                            <button onClick={() => setShowDeleteModal(it.noSurat)} className="bg-red-500/10 text-red-400 px-3 py-1.5 rounded-lg font-black"><i data-lucide="trash-2" style={{width: 14}}></i></button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </GlassCard>
                            </div>
                        )}

                        {view === 'ajukan' && (
                            <div className="max-w-4xl mx-auto fade-in">
                                <h2 className="text-2xl font-black mb-8 uppercase flex items-center gap-4 italic text-left"><i data-lucide="file-plus" className="text-indigo-400"></i> Form COPM</h2>
                                <GlassCard>
                                    <form onSubmit={handleSubmitCOPM} className="grid grid-cols-1 md:grid-cols-2 gap-x-8 text-left">
                                        <InputField label="Nomor Surat" type="text" value={formCOPM.noSurat} onChange={e => setFormCOPM(p => ({...p, noSurat: e.target.value}))} disabled={user.role !== 'admin'} placeholder="Input Admin" />
                                        <InputField label="Judul Surat" type="text" value={formCOPM.judul} onChange={e => setFormCOPM(p => ({...p, judul: e.target.value}))} required placeholder="Nama Surat" />
                                        <InputField label="Link Docs" type="url" value={formCOPM.linkDocs} onChange={e => setFormCOPM(p => ({...p, linkDocs: e.target.value}))} required placeholder="https://..." />
                                        <SelectField label="Owner" options={OWNER_LIST} value={formCOPM.owner} onChange={e => setFormCOPM(p => ({...p, owner: e.target.value}))} required />
                                        <InputField label="Tgl Isi" type="date" value={formCOPM.tglIsi} onChange={e => setFormCOPM(p => ({...p, tglIsi: e.target.value}))} required />
                                        <InputField label="Deadline" type="date" value={formCOPM.deadline} onChange={e => setFormCOPM(p => ({...p, deadline: e.target.value}))} required />
                                        {user.role === 'admin' ? (
                                            <>
                                                <SelectField label="Status" options={STATUS_LIST} value={formCOPM.status} onChange={e => setFormCOPM(p => ({...p, status: e.target.value}))} />
                                                <InputField label="Link PDF Final" type="url" value={formCOPM.linkPdf} onChange={e => setFormCOPM(p => ({...p, linkPdf: e.target.value}))} placeholder="Link Berkas" />
                                            </>
                                        ) : (
                                            <div className="mb-4 bg-blue-500/10 p-5 rounded-2xl border border-blue-500/20 text-left">
                                                <p className="text-[10px] font-black uppercase text-blue-300 text-left">Status Saat Ini</p>
                                                <span className="font-black uppercase text-lg tracking-tighter text-left">{formCOPM.status || 'Draft'}</span>
                                            </div>
                                        )}
                                        <div className="md:col-span-2"><InputField label="Notes" type="text" value={formCOPM.notes} onChange={e => setFormCOPM(p => ({...p, notes: e.target.value}))} placeholder="Info tambahan" /></div>
                                        <button disabled={submitting} className="bg-[#193DEB] hover:bg-blue-600 px-12 py-4 rounded-2xl font-black uppercase shadow-lg w-full md:w-auto text-xs tracking-widest text-left">KONFIRMASI PENGAJUAN</button>
                                    </form>
                                </GlassCard>
                            </div>
                        )}

                        {view === 'cek-status' && (
                            <div className="fade-in">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6 text-left">
                                    <h2 className="text-2xl font-black uppercase italic flex items-center gap-4 text-left"><i data-lucide="shield-check" className="text-blue-400"></i> Status COPM</h2>
                                    <div className="flex flex-col md:flex-row gap-4 w-full md:w-auto text-left">
                                        <div className="relative text-left">
                                            <i data-lucide="search" className="absolute left-4 top-1/2 -translate-y-1/2 opacity-30" style={{width:16}}></i>
                                            <input className="bg-white/5 border border-white/10 rounded-xl pl-12 pr-6 py-2.5 text-[11px] w-full md:w-64 outline-none focus:ring-2 focus:ring-blue-500 transition-all font-bold" placeholder={user.role === 'admin' ? "Cari Biro/Judul..." : "Cari Judul..."} value={searchQueryCOPM} onChange={e => setSearchQueryCOPM(e.target.value)} />
                                        </div>
                                        <div className="flex items-center gap-4 bg-white/5 border border-white/10 rounded-2xl px-5 py-2 text-left">
                                            <span className="text-[10px] font-black uppercase opacity-40">Sortir:</span>
                                            <select value={sortBy} onChange={(e) => setSortBy(e.target.value)} className="bg-transparent text-[11px] font-black uppercase outline-none cursor-pointer text-blue-400">
                                                <option value="terbaru">Terbaru (Baris Terakhir)</option>
                                                <option value="judul">Judul (A-Z)</option>
                                                <option value="owner">Owner (A-Z)</option>
                                                <option value="status">Status (A-Z)</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                <GlassCard className="p-0 overflow-hidden">
                                    <div className="overflow-x-auto text-left">
                                        <table className="w-full text-left text-[11px] whitespace-nowrap">
                                            <thead className="bg-white/5 font-black uppercase tracking-widest text-indigo-200">
                                                <tr>
                                                    <th className="px-8 py-6 border-r border-white/5 text-left">Pengajuan</th>
                                                    <th className="px-8 py-6 border-r border-white/5 text-left">Owner</th>
                                                    <th className="px-8 py-6 border-r border-white/5 text-center">Status</th>
                                                    <th className="px-8 py-6 text-center text-left text-xs">Aksi</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-white/5 text-left">
                                                {finalCOPM.map((it, i) => (
                                                    <tr key={i} className="hover:bg-white/[0.04] transition-colors text-left">
                                                        <td className="px-8 py-6 text-left">
                                                            <div className="font-black text-white uppercase text-xs tracking-tighter text-left">{it.judul}</div>
                                                            <div className="text-[9px] opacity-40 font-mono italic mt-1 text-left">
                                                                {it.tglIsi || '-'} | {it.noSurat ? it.noSurat : "menunggu admin"}
                                                            </div>
                                                        </td>
                                                        <td className="px-8 py-6 font-bold text-gray-400 text-left uppercase">{it.owner}</td>
                                                        <td className="px-8 py-6 text-center">
                                                            <span className={`px-4 py-1.5 rounded-xl font-black text-[9px] uppercase tracking-widest border ${it.status === 'Final' ? 'bg-green-500/10 text-green-400 border-green-500/20' : it.status === 'Revisi' ? 'bg-orange-500/10 text-orange-400 border-orange-500/20' : 'bg-blue-500/10 text-blue-400 border-blue-500/20'}`}>{it.status || 'Draft'}</span>
                                                        </td>
                                                        <td className="px-8 py-6 flex justify-center gap-4 text-left">
                                                            <a href={it.linkDocs} target="_blank" className="p-2.5 bg-white/5 hover:bg-white/15 rounded-xl text-blue-400 transition-all border border-white/10" title="DOCS"><i data-lucide="file-text" style={{width: 16}}></i></a>
                                                            <button onClick={() => handleEditCOPM(it)} className="p-2.5 bg-white/5 hover:bg-white/15 rounded-xl text-indigo-400 transition-all border border-white/10" title="EDIT"><i data-lucide="edit-3" style={{width: 16}}></i></button>
                                                            {it.linkPdf && <a href={it.linkPdf} target="_blank" className="p-2.5 bg-green-500/10 hover:bg-green-500/20 rounded-xl text-green-400 transition-all border border-green-500/20" title="PDF"><i data-lucide="file-check" style={{width: 16}}></i></a>}
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </GlassCard>
                            </div>
                        )}
                    </div>

                    {/* Modal Hapus */}
                    {showDeleteModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/95 backdrop-blur-md p-4 fade-in">
                            <GlassCard className="max-w-md w-full text-center border-t-8 border-t-red-600 shadow-2xl text-left">
                                <i data-lucide="alert-triangle" className="mx-auto text-red-500 mb-6" style={{width: 60, height: 60}}></i>
                                <h3 className="text-xl font-black mb-3 text-white uppercase tracking-tighter text-left">Konfirmasi Hapus</h3>
                                <p className="text-[11px] text-gray-400 mb-10 font-bold px-8 leading-relaxed uppercase text-left">Hapus arsip nomor: <span className="text-red-400 font-black">{showDeleteModal}</span>?</p>
                                <div className="flex gap-4 px-4 text-left">
                                    <button onClick={() => setShowDeleteModal(null)} className="flex-1 py-4 rounded-2xl bg-white/5 font-black uppercase text-[10px] border border-white/10 text-left">BATAL</button>
                                    <button onClick={() => handleDeleteArsip(showDeleteModal)} className="flex-1 py-4 rounded-2xl bg-red-600 font-black uppercase text-[10px] text-white text-left">HAPUS DATA</button>
                                </div>
                            </GlassCard>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
